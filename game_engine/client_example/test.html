<!DOCTYPE html>
<html>
<head>
    <title>Simple Babylon Test</title>
    <style>
        body { margin: 0; }
        canvas { width: 100%; height: 100vh; display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script type="module">
        import { Engine, Scene, Vector3, MeshBuilder, HemisphericLight, ArcRotateCamera } from '@babylonjs/core';

        const canvas = document.getElementById('canvas');
        const engine = new Engine(canvas, true);
        const scene = new Scene(engine);

        // Camera - better angle for viewing
        const camera = new ArcRotateCamera('camera', Math.PI / 4, Math.PI / 3, 10, Vector3.Zero(), scene);
        camera.attachControl(canvas, true);

        // Light
        const light = new HemisphericLight('light', new Vector3(0, 1, 0), scene);
        light.intensity = 1.5;

        // Create a red sphere
        const sphere = MeshBuilder.CreateSphere('sphere', { diameter: 2 }, scene);
        sphere.position.y = 1; // Lift it above ground

        // Create ground
        const ground = MeshBuilder.CreateGround('ground', { width: 10, height: 10 }, scene);

        // Add materials
        import('@babylonjs/core').then(({ StandardMaterial, Color3 }) => {
            const sphereMat = new StandardMaterial('sphereMat', scene);
            sphereMat.diffuseColor = Color3.Red();
            sphere.material = sphereMat;

            const groundMat = new StandardMaterial('groundMat', scene);
            groundMat.diffuseColor = Color3.Green();
            ground.material = groundMat;
        });

        // Render loop
        engine.runRenderLoop(() => {
            scene.render();
        });

        window.addEventListener('resize', () => {
            engine.resize();
        });

        console.log('✅ Babylon.js scene created successfully!');
    </script>
</body>
</html>
