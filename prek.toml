[[repos]]
repo = "local"

[[repos.hooks]]
id = "cargo-fmt"
name = "Cargo Format Check"
entry = "bash -c 'cd backend && cargo fmt -- --check'"
language = "system"
files = '^backend/.*\.rs$'
pass_filenames = false
stages = ["pre-push", "manual"]

[[repos.hooks]]
id = "cargo-check-debug"
name = "Cargo Check (Debug)"
entry = "bash -c 'cd backend && RUSTFLAGS=\"-D warnings\" cargo check --all-targets'"
language = "system"
files = '^backend/'
pass_filenames = false
stages = ["pre-push", "manual"]

[[repos.hooks]]
id = "cargo-check-release"
name = "Cargo Check (Release)"
entry = "bash -c 'cd backend && RUSTFLAGS=\"-D warnings\" cargo check --release --all-targets'"
language = "system"
files = '^backend/'
pass_filenames = false
stages = ["pre-push", "manual"]

[[repos.hooks]]
id = "cargo-test"
name = "Cargo Test"
entry = "bash -c 'cd backend && cargo test'"
language = "system"
files = '^backend/'
pass_filenames = false
stages = ["pre-push", "manual"]

[[repos.hooks]]
id = "eslint"
name = "ESLint Check"
entry = "bash -c 'cd frontend && npx eslint .'"
language = "system"
files = '^frontend/.*\.(ts|tsx)$'
pass_filenames = false
stages = ["pre-push", "manual"]

[[repos.hooks]]
id = "typescript-format"
name = "TypeScript Prettier Formatting"
entry = "bash -c 'cd frontend && npx prettier --check src/'"
language = "system"
files = '^frontend/.*\.(ts|tsx)$'
pass_filenames = false
stages = ["pre-push", "manual"]

[[repos.hooks]]
id = "typescript-check"
name = "TypeScript Check"
entry = "bash -c 'cd frontend && npx tsc -b'"
language = "system"
files = '^frontend/.*\.(ts|tsx)$'
pass_filenames = false
stages = ["pre-push", "manual"]

[[repos.hooks]]
id = "vitest"
name = "Vitest Test"
entry = "bash -c 'cd frontend && npx vitest run'"
language = "system"
files = '^frontend/.*\.(ts|tsx)$'
pass_filenames = false
stages = ["pre-push", "manual"]
