name: Build and publish debug Docker image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/transcendence

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Normalize image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Build and push dev Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: CARGO_PROFILE=dev
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:debug
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:debug-sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=transcendence-docker-debug
          cache-to: type=gha,scope=transcendence-docker-debug,mode=max
