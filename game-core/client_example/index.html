<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Arena Game - Client</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #renderCanvas {
            width: 100%;
            height: 100vh;
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            min-width: 200px;
        }

        #health-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border: 2px solid #fff;
            margin-top: 10px;
            position: relative;
        }

        #health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6666);
            transition: width 0.3s ease;
        }

        #health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
        }

        #connection-status {
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .connected {
            background: #00aa00;
        }

        .disconnected {
            background: #aa0000;
        }

        .connecting {
            background: #aaaa00;
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>

    <div id="ui">
        <div id="connection-status" class="connecting">Connecting...</div>
        <div>
            <strong>Player ID:</strong> <span id="player-id">-</span><br>
            <strong>Frame:</strong> <span id="frame-number">0</span><br>
            <strong>Ping:</strong> <span id="ping">-</span>ms<br>
            <strong>Players:</strong> <span id="player-count">0</span>
        </div>
        <div id="health-bar">
            <div id="health-fill" style="width: 100%"></div>
            <div id="health-text">100 / 100</div>
        </div>
    </div>

    <div id="controls">
        <strong>Controls:</strong><br>
        WASD - Move<br>
        Space - Jump<br>
        Left Click - Attack<br>
        Mouse - Look around
    </div>

    <script type="module">
        import { initGameClient, GameNetworkClient } from './client_prediction.ts';

        // Configuration
        const SERVER_URL = 'ws://localhost:8080/game'; // Your WebSocket/WebTransport endpoint
        const LOCAL_PLAYER_ID = Math.floor(Math.random() * 10000); // In production, get from auth

        // Initialize game
        const canvas = document.getElementById('renderCanvas');
        const { engine, scene, gameClient, input } = await initGameClient(canvas, LOCAL_PLAYER_ID);

        // Update UI
        document.getElementById('player-id').textContent = LOCAL_PLAYER_ID;

        // Connect to server
        const networkClient = new GameNetworkClient(gameClient, SERVER_URL);

        // Send input to server at 60Hz
        let inputFrameCounter = 0;
        setInterval(() => {
            networkClient.sendInput(input);
            inputFrameCounter++;
        }, 1000 / 60); // 60 FPS

        // UI updates
        let lastSnapshotTime = Date.now();
        setInterval(() => {
            // Update frame counter
            document.getElementById('frame-number').textContent = inputFrameCounter;

            // Calculate ping (time since last snapshot)
            const now = Date.now();
            const ping = now - lastSnapshotTime;
            document.getElementById('ping').textContent = ping;

            // Update health bar (example)
            const localChar = gameClient.characters.get(LOCAL_PLAYER_ID);
            if (localChar) {
                const healthPercent = (localChar.health / localChar.maxHealth) * 100;
                document.getElementById('health-fill').style.width = healthPercent + '%';
                document.getElementById('health-text').textContent =
                    Math.ceil(localChar.health) + ' / ' + localChar.maxHealth;
            }

            // Update player count
            document.getElementById('player-count').textContent = gameClient.characters.size;
        }, 100);

        // Connection status
        networkClient.ws.addEventListener('open', () => {
            const status = document.getElementById('connection-status');
            status.textContent = 'Connected';
            status.className = 'connected';
        });

        networkClient.ws.addEventListener('close', () => {
            const status = document.getElementById('connection-status');
            status.textContent = 'Disconnected';
            status.className = 'disconnected';
        });

        networkClient.ws.addEventListener('message', () => {
            lastSnapshotTime = Date.now();
        });

        // Window resize
        window.addEventListener('resize', () => {
            engine.resize();
        });

        // Handle page visibility (pause when tabbed out)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // Clear input when tabbing out
                input.movementDirection = { x: 0, y: 0, z: 0 };
                input.isAttacking = false;
                input.isJumping = false;
            }
        });
    </script>
</body>
</html>
